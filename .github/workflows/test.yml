name: test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install flatseek and flatbench
        run: |
          python -m pip install --upgrade pip
          cd ..
          git clone https://github.com/flatseek/flatseek.git
          cd flatseek
          pip install -e .
          cd ..
          git clone https://github.com/flatseek/flatbench.git
          cd flatbench
          pip install -e .

      - name: Install flatperf
        run: |
          cd flatperf
          pip install -e .

      - name: Smoke-test CLI
        run: |
          flatperf --help
          flatperf generate --help
          flatperf profile --help
          flatperf compare --help
          flatperf search --help
          flatperf bench-search --help
          flatperf join --help
          flatperf bench-join --help
          flatperf aggregate --help
          flatperf bench-aggregate --help
          flatperf encrypt --help
          flatperf decrypt --help
          flatperf compress --help
          flatperf delete --help

      - name: Run unit tests
        run: pytest tests/ -v

      - name: Integration test
        if: matrix.python-version == '3.12'
        run: |
          flatperf generate --schema article --rows 1000 --output /tmp/test_data.csv
          flatperf profile /tmp/test_data.csv --rows 100 --top 10

      - name: Upload test artifacts
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: |
            .pytest_cache/
            htmlcov/
          retention-days: 7
          continue-on-error: true